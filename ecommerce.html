<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Website</title>
</head>
<body>

    <h1 align="center">My Online Store</h1>

    <hr>

    <h2>Products</h2>

    <table border="1">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Buy</th>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>₹50,000</td>
            <td><button>Add to Cart</button></td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td>₹20,000</td>
            <td><button>Add to Cart</button></td>
        </tr>
        <tr>
            <td>Headphones</td>
            <td>₹2,000</td>
            <td><button>Add to Cart</button></td>
        </tr>
    </table>

    <hr>

    <h2>Customer Details</h2>

    <form>
        Name: <input type="text"><br><br>
        Email: <input type="email"><br><br>
        Address:<br>
        <textarea rows="3" cols="30"></textarea><br><br>
        <input type="submit" value="Place Order">
    </form>

</body>
</html>
